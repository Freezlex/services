apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapse-dpl
  namespace: matrix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synapse
  template:
    metadata:
      labels:
        app: synapse
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: render-config
          image: alpine:latest
          command:
            - sh
            - -c
            - |
              apk add --no-cache gettext
              envsubst < /tmp/template/homeserver.yaml > /data/homeserver.yaml
              chown -R 1000:1000 /data
              chmod -R 775 /data
          envFrom:
            - secretRef:
                name: matrix-secrets
          volumeMounts:
            - name: synapse-raw-config
              mountPath: /tmp/template
            - name: synapse-data
              mountPath: /data
      containers:
        - name: synapse
          image: matrixdotorg/synapse:latest
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - containerPort: 8008
          envFrom:
            - secretRef:
                name: matrix-secrets
          volumeMounts:
            - name: synapse-data
              mountPath: /data
            - name: synapse-raw-config
              mountPath: /data/k8s.test.log.config
              subPath: k8s.test.log.config
      volumes:
        - name: synapse-raw-config
          configMap:
            name: synapse-cfm
        - name: synapse-data
          persistentVolumeClaim:
            claimName: synapse-pvc
