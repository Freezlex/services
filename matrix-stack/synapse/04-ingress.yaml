apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: synapse-ing
  namespace: matrix
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`matrix.k8s.test`)
      services:
        - kind: Service
          name: synapse-svc
          port: 8008
    - kind: Rule
      match: Host(`k8s.test`) && PathPrefix(`/.well-known/matrix`)
      services:
        - name: synapse-svc
          port: 8008
