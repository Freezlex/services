apiVersion: v1
kind: ConfigMap
metadata:
  name: synapse-cfm
  namespace: matrix
data:
  homeserver.yaml: |
    server_name: "k8s.test"
    pid_file: /data/homeserver.pid
    listeners:
      - port: 8008
        tls: false
        type: http
        x_forwarded: true
        resources:
          - names: [client, federation]
            compress: false
    database:
      name: psycopg2
      args:
        user: ${MX_DB_USERNAME}
        password: ${MX_DB_PASSWORD}
        dbname: ${MX_DB_NAME}
        host: postgres-svc
        port: 5432
        cp_min: 5
        cp_max: 10
    log_config: "/data/k8s.test.log.config"
    media_store_path: /data/media_store
    registration_shared_secret: "${MX_REGISTRATION_SECRET}"
    report_stats: true
    macaroon_secret_key: "${MX_MACAROON_SECRET}"
    form_secret: "${MX_FORM_SECRET}"
    signing_key_path: "/data/k8s.test.signing.key"
    trusted_key_servers:
      - server_name: "matrix.org"
    password_config:
      enabled: false
    matrix_authentication_service:
      enabled: true
      endpoint: http://mas-svc:8080/
      secret: "${MX_MAS_EXCHANGE_TOKEN}"
  logger-config: |
    version: 1
    formatters:
        precise:
            format: '%(asctime)s - %(name)s - %(lineno)d - %(levelname)s - %(request)s - %(message)s'
    handlers:
        file:
            class: logging.handlers.TimedRotatingFileHandler
            formatter: precise
            filename: /data/homeserver.log
            when: midnight
            backupCount: 3
            encoding: utf8
        buffer:
            class: synapse.logging.handlers.PeriodicallyFlushingMemoryHandler
            target: file
            capacity: 10
            flushLevel: 30
            period: 5
        console:
            class: logging.StreamHandler
            formatter: precise
    loggers:
        synapse.storage.SQL:
            level: WARN
    root:
        level: INFO
        handlers: [buffer]
    disable_existing_loggers: false
