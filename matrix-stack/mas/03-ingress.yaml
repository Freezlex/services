apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mas-matrix-proxy-ing
  namespace: matrix
spec:
  entryPoints:
    - websecure
  routes:
    - match: >-
        Host(`matrix.k8s.test`) &&
        (
          PathPrefix(`/_matrix/client/v3/login`) ||
          PathPrefix(`/_matrix/client/v3/logout`) ||
          PathPrefix(`/_matrix/client/v3/refresh`)
        )
      kind: Rule
      priority: 100
      services:
        - name: mas-svc
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mas-ing
  namespace: matrix
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`auth.k8s.test`)
      kind: Rule
      services:
        - name: mas-svc
          port: 80
