apiVersion: v1
kind: Service
metadata:
  name: livekit-jwt
  namespace: matrix
spec:
  type: ClusterIP
  selector:
    app: livekit-jwt
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: livekit
  namespace: matrix
spec:
  type: ClusterIP
  selector:
    app: livekit
  ports:
    - name: http
      port: 7880
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: livekit-media
  namespace: matrix
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.1.200
    metallb.universe.tf/allow-shared-ip: homelab-vip
spec:
  type: LoadBalancer
  selector:
    app: livekit
  ports:
    - name: rtc-tcp
      port: 7881
      targetPort: rtc-tcp
      protocol: TCP
    - name: rtc-udp
      port: 7882
      targetPort: 7882
      protocol: UDP
