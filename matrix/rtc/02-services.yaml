apiVersion: v1
kind: Service
metadata:
  name: livekit-jwt
  namespace: matrix
spec:
  type: ClusterIP
  selector:
    app: livekit-jwt
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: livekit
  namespace: matrix
spec:
  type: ClusterIP
  selector:
    app: livekit
  ports:
    - name: http
      port: 7880
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: livekit-media
  namespace: matrix
  annotations:
    service.beta.kubernetes.io/external-traffic: "OnlyLocal"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: livekit
  ports:
    - name: rtc-tcp
      port: 7881
      targetPort: rtc-tcp
      protocol: TCP
    - name: rtc-udp
      port: 7882
      targetPort: rtc-udp
      protocol: UDP
