apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit-config
  namespace: matrix
data:
  livekit.yaml: |
    port: 7880
    bind_addresses:
      - "0.0.0.0"
    rtc:
      tcp_port: 7881
      port_range_start: 50100
      port_range_end: 50200
      node_ip: "192.168.49.2"
      use_external_ip: false
    room:
      auto_create: false
    keys:
      ${LIVEKIT_KEY}: ${LIVEKIT_SECRET}
    logging:
      level: info
