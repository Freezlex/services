apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit-config
  namespace: matrix
data:
  livekit.yaml: |
    port: 7880
    bind_addresses:
      - "0.0.0.0"
    rtc:
      tcp_port: 7881
      udp_port: 7882
      port_range_start: 50100
      port_range_end: 50200
      node_ip: "${LIVEKIT_NODE_IP}"
      use_external_ip: false
    room:
      auto_create: false
    keys:
      default: "${LIVEKIT_SECRET}"
    logging:
      level: info
