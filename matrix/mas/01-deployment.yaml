apiVersion: apps/v1
kind: Deployment
metadata:
  name: mas
  namespace: matrix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mas
  template:
    metadata:
      labels:
        app: mas
    spec:
      initContainers:
        - name: render-config
          image: alpine:3.21
          command:
            - sh
            - -c
            - |
              apk add --no-cache gettext
              envsubst < /tmp/template/config.yaml > /tmp/rendered/config.yaml
              echo "MAS config rendered successfully."
          envFrom:
            - secretRef:
                name: matrix-creds
          volumeMounts:
            - name: mas-raw-config
              mountPath: /tmp/template
              readOnly: true
            - name: mas-rendered-config
              mountPath: /tmp/rendered
          securityContext:
            allowPrivilegeEscalation: false

      containers:
        - name: mas
          image: ghcr.io/element-hq/matrix-authentication-service:1.16.0
          args:
            - "server"
            - "--config"
            - "/etc/mas/config.yaml"
            - "--config"
            - "/etc/mas/secrets.yaml"
          ports:
            - name: http
              containerPort: 8080
            - name: internal
              containerPort: 8081
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          startupProbe:
            httpGet:
              path: /health
              port: internal
            failureThreshold: 20
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: internal
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: internal
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
          volumeMounts:
            - name: mas-rendered-config
              mountPath: /etc/mas/config.yaml
              subPath: config.yaml
            - name: mas-creds
              mountPath: /etc/mas/secrets.yaml
              subPath: secrets.yaml
              readOnly: true
      volumes:
        - name: mas-raw-config
          configMap:
            name: mas-cfm
        - name: mas-rendered-config
          emptyDir: {}
        - name: mas-creds
          secret:
            secretName: mas-creds
