# This file is listed in .gitignore and must NEVER be committed.
# Copy 01-secrets.yaml.example, fill in real values, then apply:
#   kubectl apply -f matrix-stack/01-secrets.yaml
#
# To generate strong secrets:
#   openssl rand -hex 32

apiVersion: v1
kind: Secret
metadata:
  name: pg-creds
  namespace: matrix
type: Opaque
stringData:
  DB_ROOT_USERNAME: "CHANGE_ME"
  DB_ROOT_PASSWORD: "CHANGE_ME"

---
apiVersion: v1
kind: Secret
metadata:
  name: matrix-creds
  namespace: matrix
type: Opaque
stringData:
  DB_HOST: "pg-svc"

  # Synapse database credentials
  MX_DB_USERNAME: "CHANGE_ME"
  MX_DB_PASSWORD: "CHANGE_ME"
  MX_DB_NAME: "matrix_synapse"

  # Synapse secrets — generate each with: openssl rand -hex 32
  MX_REGISTRATION_SECRET: "CHANGE_ME"
  MX_MACAROON_SECRET: "CHANGE_ME"
  MX_FORM_SECRET: "CHANGE_ME"

  # MAS database credentials
  MAS_DB_USERNAME: "CHANGE_ME"
  MAS_DB_PASSWORD: "CHANGE_ME"
  MAS_DB_NAME: "matrix_auth"

  # Shared token between MAS and Synapse — generate with: openssl rand -hex 32
  MX_MAS_EXCHANGE_TOKEN: "CHANGE_ME"

---
# MAS secrets split into their own Secret so the MAS pod only mounts
# what it needs (principle of least privilege), and because MAS-generated
# keys (signing keys, encryption secret) are large structured values that
# sit alongside simple string secrets.
#
# Populate MAS_ENCRYPTION_SECRET with: openssl rand -hex 32
# The signing_keys block is the raw YAML output of: mas-cli config generate
# Paste only the `secrets.keys` list from that output here as a single
# multi-line string value.
apiVersion: v1
kind: Secret
metadata:
  name: mas-creds
  namespace: matrix
type: Opaque
stringData:
  MAS_ENCRYPTION_SECRET: "CHANGE_ME"

  # Paste the full `secrets:` block from `mas-cli config generate` here.
  # Example structure (replace entirely with real output):
  #
  # secrets.yaml: |
  #   secrets:
  #     encryption: <hex>
  #     keys:
  #       - kid: "abc123"
  #         use: "sig"
  #         ...
  secrets.yaml: |
    secrets:
      encryption: "CHANGE_ME"
      keys: []
