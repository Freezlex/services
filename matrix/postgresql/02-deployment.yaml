apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg
  namespace: matrix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        fsGroup: 999

      initContainers:
        - name: render-init-sql
          image: alpine@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659
          command:
            - sh
            - -c
            - |
              apk add --no-cache gettext
              envsubst < /tmp/template/init.sql > /tmp/rendered/init.sql
              echo "init.sql rendered successfully"
          envFrom:
            - secretRef:
                name: matrix-creds
          volumeMounts:
            - name: postgres-raw-config
              mountPath: /tmp/template
              readOnly: true
            - name: postgres-rendered-config
              mountPath: /tmp/rendered
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: false

      containers:
        - name: postgres
          image: postgres@sha256:3e43515057e113ee741fca2f621f15300be34a6d4a8dfcf2e20651288c8272f3
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pg-creds
                  key: DB_ROOT_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-creds
                  key: DB_ROOT_PASSWORD
            - name: POSTGRES_INITDB_ARGS
              value: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
            - name: postgres-rendered-config
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: postgres-raw-config
          configMap:
            name: pg-cfm
        - name: postgres-data
          persistentVolumeClaim:
            claimName: pg-pvc
        - name: postgres-rendered-config
          emptyDir: {}
