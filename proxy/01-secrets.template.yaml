apiVersion: v1
kind: Secret
metadata:
  name: traefik-cf-creds
  namespace: proxy
type: Opaque
stringData:
  ROOT_EMAIL: "CHANGE_ME"
  OVH_ENDPOINT: "CHANGE_ME"
  OVH_APPLICATION_KEY: "CHANGE_ME"
  OVH_APPLICATION_SECRET: "CHANGE_ME"
  OVH_CONSUMER_KEY: "CHANGE_ME"
---
# Generate the password string with:
#   openssl passwd -6 'somepassword'
#   final should look like user:$opensslresult
apiVersion: v1
kind: Secret
metadata:
  name: traefik-dashboard-auth
  namespace: proxy
type: Opaque
stringData:
  users: "CHANGE_ME"
