apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: proxy
  labels:
    app: traefik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik-account
      containers:
        - name: traefik
          image: traefik:3.7.1
          args:
            # ── Providers ────────────────────────────────────────────────────
            - --providers.kubernetescrd
            - --providers.file.directory=/dynamic_conf/
            - --providers.file.watch=true

            # ── Entrypoints ──────────────────────────────────────────────────
            - --entrypoints.web.address=:80
            - --entrypoints.websecure.address=:443
            - --entrypoints.factorio.address=:34197/udp

            # HTTP → HTTPS redirect
            - --entrypoints.web.http.redirections.entrypoint.to=websecure
            - --entrypoints.web.http.redirections.entrypoint.scheme=https

            - --entrypoints.websecure.http.middlewares=compress@file,headers@file

            # ── Let's Encrypt (OVH DNS challenge) ────────────────────────────
            - --certificatesresolvers.letsencryptresolver.acme.dnschallenge=true
            - --certificatesresolvers.letsencryptresolver.acme.dnschallenge.provider=ovh
            - --certificatesresolvers.letsencryptresolver.acme.email=$(ROOT_EMAIL)
            - --certificatesresolvers.letsencryptresolver.acme.storage=/letsencrypt/acme.json
            # Switch to the staging URL while testing to avoid LE rate limits:
            # - --certificatesresolvers.letsencryptresolver.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory
            - --certificatesresolvers.letsencryptresolver.acme.caserver=https://acme-v02.api.letsencrypt.org/directory
            - --entrypoints.websecure.http.tls.certresolver=letsencryptresolver

            # ── API / Dashboard ──────────────────────────────────────────────
            - --api
            - --api.dashboard=true
            - --ping

            # ── Logs ─────────────────────────────────────────────────────────
            - --log.level=INFO
            - --log.format=json
            - --accesslog=true
            - --accesslog.format=json

            # ── Metrics ──────────────────────────────────────────────────────
            - --metrics.prometheus=true
            - --metrics.prometheus.addrouterslabels=true

            # ── Misc ─────────────────────────────────────────────────────────
            - --global.checknewversion=true
            - --global.sendanonymoususage=false

          env:
            - name: TZ
              value: Europe/Paris
          envFrom:
            - secretRef:
                name: traefik-cf-creds

          ports:
            - name: web
              containerPort: 80
            - name: websecure
              containerPort: 443
            - name: dashboard
              containerPort: 8080
            - name: factorio
              containerPort: 34197

          volumeMounts:
            - name: acme-data
              mountPath: /letsencrypt
            - name: dynamic-config
              mountPath: /dynamic_conf
              readOnly: true

          startupProbe:
            httpGet:
              path: /ping
              port: dashboard
            failureThreshold: 20
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /ping
              port: dashboard
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ping
              port: dashboard
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          securityContext:
            capabilities:
              drop: [ALL]
              add: [NET_BIND_SERVICE]

      volumes:
        - name: acme-data
          persistentVolumeClaim:
            claimName: traefik-acme-pvc
        - name: dynamic-config
          configMap:
            name: traefik-dynamic-config
