apiVersion: v1
kind: PersistentVolume
metadata:
  name: forgejo-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - mako
  hostPath:
    path: /data/k8s/forgejo/data
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgejo-pvc
  namespace: forgejo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: local-storage
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-config
  namespace: forgejo
data:
  app.ini: |
    APP_NAME = Forgejo
    RUN_MODE = prod
    RUN_USER = git

    [server]
    DOMAIN           = git.polarys.im
    ROOT_URL         = https://git.polarys.im
    HTTP_PORT        = 3000
    SSH_DOMAIN       = git.polarys.im
    SSH_PORT         = 22
    # Internal SSH port the container listens on — different from the
    # external port 22 exposed via Traefik TCP entrypoint.
    SSH_LISTEN_PORT  = 2222
    START_SSH_SERVER = true
    DISABLE_SSH      = false
    LFS_START_SERVER = true

    [database]
    DB_TYPE  = postgres
    HOST     = forgejo-pg-svc:5432
    NAME     = forgejo
    USER     = forgejo
    # Password is injected via environment variable DB_PASSWORD below.
    PASSWD   = ${DB_PASSWORD}
    SSL_MODE = disable

    [repository]
    ROOT = /data/gitea/repositories

    [security]
    INSTALL_LOCK        = true
    # SECRET_KEY and INTERNAL_TOKEN injected via environment variables.
    SECRET_KEY          = ${SECRET_KEY}
    INTERNAL_TOKEN      = ${INTERNAL_TOKEN}
    MIN_PASSWORD_LENGTH = 12

    [service]
    DISABLE_REGISTRATION              = true   # ← disable local registration
    ALLOW_ONLY_EXTERNAL_REGISTRATION  = true   # ← force SSO registration
    REQUIRE_SIGNIN_VIEW               = false
    REGISTER_EMAIL_CONFIRM            = false
    ENABLE_NOTIFY_MAIL                = false
    ENABLE_CAPTCHA                    = false
    DEFAULT_KEEP_EMAIL_PRIVATE        = true
    DEFAULT_ALLOW_CREATE_ORGANIZATION = true
    # Allow auto-creation of accounts on first SSO login
    ALLOW_ONLY_INTERNAL_REGISTRATION  = false

    [oauth2]
    ENABLE = true
    # JWT secret for Forgejo's internal OAuth2 provider (not MAS).
    # Generate with: openssl rand -hex 32
    JWT_SECRET = ${OAUTH2_JWT_SECRET}

    [oauth2.mas]
    NAME                  = polarys
    PROVIDER              = openidConnect
    KEY                   = forgejo
    SECRET                = ${MAS_CLIENT_SECRET}
    AUTO_DISCOVER_URL     = https://auth.polarys.im/.well-known/openid-configuration
    SCOPES                = openid email
    # Map OIDC claims to Forgejo user fields.
    # MAS only exposes openid+email (no profile scope), so:
    # - Username comes from `sub` (stable unique identifier from MAS)
    # - Email comes from `email` claim
    ATTRIBUTE_USERNAME    = sub
    ATTRIBUTE_NAME        = sub
    ATTRIBUTE_EMAIL       = email
    # Auto-create account on first login
    GROUP_CLAIM_NAME      =
    ADMIN_GROUP           =
    RESTRICTED_GROUP      =
    SKIP_LOCAL_TWO_FA     = false

    [security]
    INSTALL_LOCK        = true
    SECRET_KEY          = ${SECRET_KEY}
    INTERNAL_TOKEN      = ${INTERNAL_TOKEN}
    MIN_PASSWORD_LENGTH = 12
    # Disable local password login — SSO only
    PASSWORD_HASH_ALGO  = argon2
    DISABLE_GIT_HOOKS   = false


    [cache]
    ADAPTER = memory

    [session]
    PROVIDER = memory

    [log]
    MODE      = console
    LEVEL     = info
    ROOT_PATH = /data/log

    [actions]
    ENABLED = true

    [mailer]
    ENABLED = false
