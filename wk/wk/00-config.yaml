apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-cfg
  namespace: wk
data:
  default.conf: |
    server {
      listen 80;
      server_name localhost;
      root /usr/share/nginx/html;

      location / {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
        default_type application/json;
        try_files $uri $uri/ =404;
      }
    }
  # /.well-known/matrix/client
  matrix-client: |
    {
      "m.homeserver": { "base_url": "https://matrix.polarys.im" },
      "org.matrix.msc2965.authentication": {
        "issuer": "https://auth.polarys.im/",
        "account": "https://auth.polarys.im/account"
      },
      "org.matrix.msc4143.rtc_foci": [
        {
          "type": "livekit",
          "livekit_service_url": "https://rtc.polarys.im/livekit/jwt"
        }
      ]
    }
  # /.well-known/matrix/server
  matrix-server: |
    { "m.server": "matrix.polarys.im:443" }
  # /.well-known/security.txt
  security: |
    Contact: mailto:incidents@polarys.im
    Expires: 2027-12-31T23:59:59.000Z
    Preferred-Languages: fr, en, de
